# CodeRabbit Configuration
# This file configures CodeRabbit's AI-powered code reviews.

language: en-US

reviews:
  profile: "chill" # Options: chill, assertive, obsessive
  request_reviews_from_ai: true
  auto_review:
    enabled: true
    drafts: false
  
  # Path patterns to ignore
  ignore_paths:
    - "**.g.dart"
    - "**.freezed.dart"
    - "lib/generated/**"
    - "assets/**"

  # Custom instructions for CodeRabbit
  path_instructions:
    - path: "lib/features/quran/**"
      instructions: "Ensure that Arabic text uses the 'DigitalKhatt' font family and Urdu text uses 'Jameel Noori'."
    - path: "lib/features/prophets/**"
      instructions: "Maintain literal, word-for-word accuracy of the narratives as per the provided source data."

chat:
  enabled: true
